name: "Build and Deploy Documentation"

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main", "01-test-pages" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/configure-pages@v5

      # Runs a set of commands using the runners shell
      - name: Install project and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Generate tables
        run: |
          python -m scripts.build_long_guard_time_prach_pusch_combination_tables
          python -m scripts.build_prach_ssb_collision_free_tables
          python -m scripts.build_tau_d_max_rtd_max_table

      - name: Build documentation
        run: |
          sphinx-apidoc -f -o docs/api . docs site test.py
          sphinx-build -b html --keep-going docs docs/_build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build

  deploy:

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4